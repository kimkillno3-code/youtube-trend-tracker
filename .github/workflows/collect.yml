name: YouTube Trend Collector

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = KST 08:00
    - cron: '0 9 * * *'    # UTC 09:00 = KST 18:00
  workflow_dispatch:        # 수동 실행

permissions:
  contents: read

jobs:
  collect-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: youtube-trends
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          test -n "${YOUTUBE_API_KEY}" && echo "API key set" || { echo "::error::YOUTUBE_API_KEY is empty"; exit 1; }

      - name: Download database
        uses: actions/download-artifact@v4
        with:
          name: youtube-trends-db
          path: data/
        continue-on-error: true

      - name: Collect trends and send notifications
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_CHANNELS: ${{ secrets.NOTIFICATION_CHANNELS }}
        run: |
          echo "수집 시작: $(date '+%Y-%m-%d %H:%M:%S KST')"
          python main.py --collect --notify
          echo "수집 완료: $(date '+%Y-%m-%d %H:%M:%S KST')"

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: youtube-trends-db
          path: data/youtube_trends.db
          retention-days: 90
        if: always()
